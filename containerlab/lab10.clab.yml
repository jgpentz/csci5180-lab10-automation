name: lab10-twin

mgmt:
  network: lab10
  ipv4-subnet: 192.168.99.0/24

topology:
  kinds:
    cisco_iol:
      image: ghcr.io/jgpentz/cisco_iol:17.15.01

  nodes:
    leaf1:
      kind: cisco_iol
      mgmt-ipv4: 192.168.99.11
    leaf2:
      kind: cisco_iol
      mgmt-ipv4: 192.168.99.12
    spine1:
      kind: cisco_iol
      mgmt-ipv4: 192.168.99.21
    spine2:
      kind: cisco_iol
      mgmt-ipv4: 192.168.99.22
    gw1:
      kind: cisco_iol
      mgmt-ipv4: 192.168.99.31
    gw2:
      kind: cisco_iol
      mgmt-ipv4: 192.168.99.32

  links:
    # leaf1 uplinks (clab eth1..eth4 → IOL Ethernet0/1–0/3, E1/0 per cisco_iol kind)
    - endpoints: ["leaf1:eth1", "spine1:eth1"] # 10.0.11.0/31
    - endpoints: ["leaf1:eth2", "spine2:eth1"] # 10.0.12.0/31
    - endpoints: ["leaf1:eth3", "gw1:eth1"]    # 10.0.101.0/31
    - endpoints: ["leaf1:eth4", "gw2:eth1"]    # 10.0.102.0/31
    - endpoints: ["leaf1:eth5", "leaf2:eth5"]    # 10.0.102.0/31
    - endpoints: ["leaf1:eth6", "spine1:eth5"]    # 10.0.102.0/31
    - endpoints: ["leaf1:eth7", "spine2:eth5"]    # 10.0.102.0/31

    # leaf2 uplinks (same eth→IOS mapping as leaf1)
    - endpoints: ["leaf2:eth1", "spine1:eth2"] # 10.0.21.0/31
    - endpoints: ["leaf2:eth2", "spine2:eth2"] # 10.0.22.0/31
    - endpoints: ["leaf2:eth3", "gw1:eth2"]    # 10.0.201.0/31
    - endpoints: ["leaf2:eth4", "gw2:eth2"]    # 10.0.202.0/31
