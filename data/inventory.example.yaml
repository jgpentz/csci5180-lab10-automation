# Copy to data/inventory.yaml (gitignored). Set host to each device's mgmt IP.
# export LAB10_SSH_PASSWORD=...
# Optional: export LAB10_ENABLE_SECRET=...

version: 1
defaults:
  device_type: cisco_ios
  username: cisco
  port: 22
  password_env: LAB10_SSH_PASSWORD
  secret_env: LAB10_ENABLE_SECRET

devices:
  leaf1:
    host: 192.168.99.11
  leaf2:
    host: 192.168.99.12
  spine1:
    host: 192.168.99.21
  spine2:
    host: 192.168.99.22
  gw1:
    host: 192.168.99.31
  gw2:
    host: 192.168.99.32
