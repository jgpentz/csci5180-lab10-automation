# Containerlab twin inventory.
# Use with scripts/push.py and scripts/verify.py once lab10.clab.yml is deployed.
version: 1
defaults:
  device_type: cisco_ios
  username: cisco
  port: 22
  password_env: LAB10_SSH_PASSWORD
  secret_env: ""

devices:
  leaf1:
    host: 192.168.100.11
  leaf2:
    host: 192.168.100.12
  spine1:
    host: 192.168.100.21
  spine2:
    host: 192.168.100.22
  gw1:
    host: 192.168.100.31
  gw2:
    host: 192.168.100.32
