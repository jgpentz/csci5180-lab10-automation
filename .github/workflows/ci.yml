name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      debug:
        description: "Open tmate session for runner debug"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check .

      - name: Unit tests
        run: uv run pytest tests/ -v

  containerlab-twin:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Install containerlab
        run: |
          curl -sL https://containerlab.dev/setup | sudo -E bash -s "all"

      - name: Ensure Docker is available
        run: |
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker.io
          fi
          sudo systemctl start docker || true
          docker --version

      - name: Pull Cisco IOL image
        run: sudo docker pull ghcr.io/jgpentz/cisco_iol:17.15.01

      - name: Run containerlab twin pipeline
        env:
          LAB10_SSH_PASSWORD: admin
        run: uv run python scripts/clab_twin.py --ssh-timeout 300

      - name: Tmate debug session
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug == 'true' }}
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true
