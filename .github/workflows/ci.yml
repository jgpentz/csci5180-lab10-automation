name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff lint
        run: uv run ruff check .

      - name: Unit tests
        run: uv run pytest tests/ -v

  containerlab-twin:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Install containerlab
        run: |
          curl -sL https://containerlab.dev/setup | sudo -E bash -s "all"

      - name: Ensure Docker is available
        run: |
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker.io
          fi
          sudo systemctl start docker || true
          docker --version

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Cisco IOL image
        run: docker pull ghcr.io/jgpentz/cisco_iol:17.15.01

      - name: Run containerlab twin pipeline
        env:
          LAB10_SSH_PASSWORD: admin
          LAB10_SSH_PASSWORD_CLAB: admin
        run: uv run python scripts/clab_twin.py --ssh-timeout 300
